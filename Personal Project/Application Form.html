<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="container">
    <h1>Registration Form</h1>
    <form>
    <tr>
        <td><label for="Name" ></label></td>
        <td><input type="text" id="Name"placeholder="Name*"></td>
    </tr>
    <br>
    <br>
    <tr>
        <td><label for="Email"></label></td>
        <td><input type="text" id="Email" placeholder="Email*"></td>
    </tr>
    <br>
    <br>
    <tr>
        <td><label for="Phone"></label></td>
        <td><input type="Text" id="Phone" placeholder="Phone*" maxlength="10"></td>
    </tr>
    <br>
    <br>
    <tr>
        <td><label for="Subject"></label></td>
        <td><select name="Subject" id="Subject"></td>
        <option> Subject*</option>
        <option value="Math">Math</option>
        <option value="English">English</option>
        <option  value="Odia">Odia</option>
        </select>
    </tr>
    <br>
    <br>
    <tr>
        <td><textarea name="Enter message" id="Enter message" placeholder="Enter message"></textarea></td>
    </tr>
    <br>
    <br>
    <tr>
        <td><button type="submit" value="submit">Submit</button></td>
    </tr>
    </form>

</div>
    
</body>
</html>
